<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Claude Token Tracker</title>
<link rel="icon" type="image/png" href="icons/icon48.png"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body::-webkit-scrollbar { display: none; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0F0E0D;
    color: #FFFDF7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 0;
    padding: 24px 0 16px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-shrink: 0;
    width: 320px;
    position: relative;
  }
  .logo {
    width: 28px; height: 28px;
    flex-shrink: 0;
  }
  .logo img { display: block; width: 100%; height: 100%; }
  .header-text h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -.01em;
  }
  .header-text p {
    font-size: 11.5px;
    color: rgba(255,253,247,.35);
    margin-top: 1px;
  }

  /* ── Cards ── */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 320px;
  }

  .card {
    background: rgba(255,253,247,.04);
    border: 1px solid rgba(255,253,247,.07);
    border-radius: 12px;
    padding: 18px 20px 16px;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
  }
  .card-label {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,253,247,.55);
    letter-spacing: .02em;
    text-transform: uppercase;
  }
  .card-reset {
    font-size: 11px;
    color: rgba(255,253,247,.28);
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .bar-track {
    flex: 1;
    height: 4px;
    background: rgba(255,253,247,.08);
    border-radius: 100px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 100px;
    transition: width .7s cubic-bezier(.4,0,.2,1);
  }
  .pct {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -.02em;
    min-width: 58px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ── Card interactivity ── */
  .card {
    cursor: pointer;
    transition: background .2s ease, border-color .2s ease;
    position: relative;
  }
  .card:hover {
    background: rgba(255,253,247,.06);
    border-color: rgba(255,253,247,.12);
  }
  .card.expanded {
    background: rgba(255,253,247,.055);
    border-color: rgba(255,253,247,.11);
  }
  .card.no-anim,
  .card.no-anim .card-details,
  .card.no-anim .chevron {
    transition: none !important;
  }

  .chevron {
    display: inline-block;
    font-size: 9px;
    color: rgba(255,253,247,.2);
    vertical-align: middle;
    margin-left: 5px;
    opacity: 0;
    transition: opacity .2s, transform .3s ease;
  }
  .card:hover .chevron,
  .card.expanded .chevron { opacity: 1; }
  .card.expanded .chevron { transform: rotate(180deg); }

  /* ── Card expand ── */
  .card-details {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height .4s cubic-bezier(.4,0,.2,1),
                opacity .3s ease .05s,
                margin-top .3s ease;
    margin-top: 0;
  }
  .card.expanded .card-details {
    max-height: 380px;
    opacity: 1;
    margin-top: 14px;
  }

  .detail-divider {
    height: 1px;
    background: linear-gradient(90deg, rgba(255,253,247,.06), rgba(255,253,247,.03));
    margin-bottom: 10px;
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 0;
  }
  .detail-label {
    font-size: 11px;
    color: rgba(255,253,247,.28);
  }
  .detail-value {
    font-size: 11px;
    color: rgba(255,253,247,.5);
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  .detail-heading {
    font-size: 9px;
    color: rgba(255,253,247,.18);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin: 8px 0 3px;
  }
  .model-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5px 0;
  }
  .model-name {
    font-size: 10.5px;
    color: rgba(255,253,247,.25);
    max-width: 170px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .model-tokens {
    font-size: 10.5px;
    color: rgba(255,253,247,.38);
    font-variant-numeric: tabular-nums;
  }
  .sparkline {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 24px;
    margin-top: 4px;
  }
  .spark-bar {
    flex: 1;
    min-width: 0;
    border-radius: 2px 2px 0 0;
    background: rgba(59,130,246,.35);
    transition: height .5s ease;
  }
  .spark-bar.today { background: rgba(59,130,246,.7); }
  .spark-days {
    display: flex;
    gap: 3px;
    margin-top: 2px;
  }
  .spark-days span {
    flex: 1;
    text-align: center;
    font-size: 7.5px;
    color: rgba(255,253,247,.13);
    letter-spacing: .02em;
  }
  .detail-empty {
    font-size: 10.5px;
    color: rgba(255,253,247,.16);
    text-align: center;
    padding: 4px 0;
  }

  /* ── States ── */
  .state {
    width: 320px;
    text-align: center;
    color: rgba(255,253,247,.3);
    font-size: 13px;
    line-height: 1.6;
  }
  .state small {
    display: block;
    font-size: 11px;
    margin-top: 6px;
    color: rgba(255,253,247,.18);
  }

  .updated {
    margin-top: 12px;
    font-size: 10.5px;
    color: rgba(255,253,247,.18);
  }

  /* ── Live badge ── */
  .live-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 14px;
    width: 320px;
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    color: rgba(255,253,247,.3);
    border: 1px solid rgba(255,253,247,.1);
    border-radius: 100px;
    padding: 3px 8px 3px 6px;
    transition: color .3s, border-color .3s;
  }
  .live-badge.active {
    color: #4ADE80;
    border-color: rgba(74,222,128,.35);
  }
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: .5;
  }
  .live-badge.active .live-dot {
    opacity: 1;
    animation: pulse-dot 1.2s ease-in-out;
  }
  @keyframes pulse-dot {
    0%   { transform: scale(1);   opacity: 1; }
    50%  { transform: scale(1.6); opacity: .7; }
    100% { transform: scale(1);   opacity: 1; }
  }

  /* ── Update banner ── */
  .update-banner {
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: rgba(212, 103, 15, .12);
    border: 1px solid rgba(212, 103, 15, .3);
    border-radius: 10px;
    padding: 10px 14px;
    margin-top: 12px;
    width: 320px;
  }
  .update-banner.visible { display: flex; }
  .update-text {
    font-size: 11.5px;
    color: rgba(255,253,247,.7);
    line-height: 1.4;
  }
  .update-text strong { color: #F59E0B; }
  .btn-reload {
    flex-shrink: 0;
    background: #D4670F;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 11.5px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-reload:hover { background: #B85A0A; }

  /* ── Open Metric Dashboard button (right of header) ── */
  .open-usage {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    font-family: inherit;
    font-size: 9px;
    font-weight: 600;
    line-height: 1;
    color: rgba(255,253,247,.65);
    letter-spacing: .04em;
    text-transform: uppercase;
    padding: 5px 9px;
    border: 1px solid rgba(255,253,247,.12);
    border-radius: 10px;
    background: rgba(255,253,247,.03);
    cursor: pointer;
    transition: color .2s, border-color .2s, background .2s;
  }
  .open-usage:hover {
    color: #FFFDF7;
    border-color: rgba(217,119,87,.45);
    background: rgba(217,119,87,.10);
  }
  .open-usage:active { transform: translateY(-50%) scale(0.97); }

  /* ── Footer links (inline with live badge) ── */
  .footer-link {
    font-size: 11px;
    color: rgba(255,253,247,.2);
    text-decoration: none;
    letter-spacing: .01em;
    transition: color .2s;
  }
  .footer-link:hover { color: rgba(255,253,247,.5); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="icons/icon48.png" alt="Claude Token Tracker"/>
  </div>
  <div class="header-text">
    <h1>Usage</h1>
    <p>claude.ai</p>
  </div>
  <button class="open-usage" id="openUsage" type="button" aria-label="Open Claude Code metric dashboard">Dashboard</button>
</div>

<div id="content">
  <div class="state">Loading…</div>
</div>

<div class="update-banner" id="updateBanner">
  <span class="update-text">
    <strong id="updateVersion"></strong> available —
    run <code>git pull</code> then reload
  </span>
  <button class="btn-reload" id="reloadBtn">Reload</button>
</div>

<div class="live-row">
  <a class="footer-link" href="https://github.com/mmesonero" target="_blank">GitHub</a>
  <span class="live-badge" id="liveBadge">
    <span class="live-dot"></span>
    LIVE
  </span>
  <a class="footer-link" href="https://www.linkedin.com/in/mesonero/" target="_blank">LinkedIn</a>
</div>

<div class="updated" id="updated"></div>

<script src="dashboard.js"></script>
<script src="dashboard-open.js"></script>
</body>
</html>
