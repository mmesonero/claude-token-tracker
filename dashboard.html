<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Claude · Usage</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0F0E0D;
    color: #FFFDF7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
  }
  .logo {
    width: 28px; height: 28px;
    background: #D4670F;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo svg { display: block; }
  .header-text h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -.01em;
  }
  .header-text p {
    font-size: 11.5px;
    color: rgba(255,253,247,.35);
    margin-top: 1px;
  }

  /* ── Cards ── */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 320px;
  }

  .card {
    background: rgba(255,253,247,.04);
    border: 1px solid rgba(255,253,247,.07);
    border-radius: 12px;
    padding: 18px 20px 16px;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
  }
  .card-label {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,253,247,.55);
    letter-spacing: .02em;
    text-transform: uppercase;
  }
  .card-reset {
    font-size: 11px;
    color: rgba(255,253,247,.28);
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .bar-track {
    flex: 1;
    height: 4px;
    background: rgba(255,253,247,.08);
    border-radius: 100px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 100px;
    transition: width .7s cubic-bezier(.4,0,.2,1);
  }
  .pct {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -.02em;
    min-width: 58px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ── States ── */
  .state {
    width: 320px;
    text-align: center;
    color: rgba(255,253,247,.3);
    font-size: 13px;
    line-height: 1.6;
  }
  .state small {
    display: block;
    font-size: 11px;
    margin-top: 6px;
    color: rgba(255,253,247,.18);
  }

  .updated {
    margin-top: 20px;
    font-size: 10.5px;
    color: rgba(255,253,247,.18);
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <rect x="1" y="8"  width="2.5" height="4" rx=".8" fill="white" opacity=".9"/>
      <rect x="5" y="5"  width="2.5" height="7" rx=".8" fill="white" opacity=".9"/>
      <rect x="9" y="2"  width="2.5" height="10" rx=".8" fill="white" opacity=".9"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>Usage</h1>
    <p>claude.ai · plan Pro</p>
  </div>
</div>

<div id="content">
  <div class="state">Cargando…</div>
</div>

<div class="updated" id="updated"></div>

<script>
function fmtReset(iso, type) {
  if (!iso) return "";
  const d = new Date(iso), diff = d - new Date();
  if (diff <= 0) return "";
  if (type === "five_hour") {
    const m = Math.ceil(diff / 60000), h = Math.floor(m / 60);
    return "reset " + (h > 0 ? h + "h " + (m % 60) + "m" : m + "m");
  }
  const DAYS = ["dom","lun","mar","mié","jue","vie","sáb"];
  return "reset " + DAYS[d.getDay()] + " " +
    String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
}

function render(usage) {
  const dPct   = (usage.five_hour?.utilization  ?? 0);
  const wPct   = (usage.seven_day?.utilization  ?? 0);
  const dReset = fmtReset(usage.five_hour?.resets_at, "five_hour");
  const wReset = fmtReset(usage.seven_day?.resets_at, "seven_day");

  const dColor = dPct >= 90 ? "#EF4444" : dPct >= 70 ? "#F59E0B" : "#D97706";

  document.getElementById("content").innerHTML = `
    <div class="cards">
      <div class="card">
        <div class="card-top">
          <span class="card-label">Sesión · 5h</span>
          ${dReset ? `<span class="card-reset">${dReset}</span>` : ""}
        </div>
        <div class="bar-row">
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.min(100,dPct).toFixed(1)}%;background:${dColor}"></div>
          </div>
          <span class="pct" style="color:${dColor}">${dPct.toFixed(0)}%</span>
        </div>
      </div>

      <div class="card">
        <div class="card-top">
          <span class="card-label">Semanal</span>
          ${wReset ? `<span class="card-reset">${wReset}</span>` : ""}
        </div>
        <div class="bar-row">
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.min(100,wPct).toFixed(1)}%;background:#3B82F6"></div>
          </div>
          <span class="pct" style="color:#3B82F6">${wPct.toFixed(0)}%</span>
        </div>
      </div>
    </div>`;
}

function showError(msg) {
  document.getElementById("content").innerHTML =
    `<div class="state">${msg}</div>`;
}

async function fetchDirect() {
  // Try fetching directly from the extension page using chrome.cookies
  const cookie = await new Promise(r =>
    chrome.cookies.get({ url: "https://claude.ai", name: "lastActiveOrg" }, r)
  );
  if (!cookie?.value) return { error: "No cookie lastActiveOrg — ¿estás logueado en claude.ai?" };
  const orgId = cookie.value;
  try {
    const resp = await fetch(`https://claude.ai/api/organizations/${orgId}/usage`, {
      credentials: "include"
    });
    if (!resp.ok) return { error: `API status ${resp.status} — orgId: ${orgId}` };
    const data = await resp.json();
    return { data };
  } catch(e) {
    return { error: `Fetch falló: ${e.message}` };
  }
}

async function load() {
  try {
    const result = await Promise.race([
      fetchDirect(),
      new Promise((_, rej) => setTimeout(() => rej("timeout 8s"), 8000))
    ]);
    if (result.error) { showError(result.error); return; }
    render(result.data);
    document.getElementById("updated").textContent =
      "Actualizado " + new Date().toLocaleTimeString("es-ES", { hour:"2-digit", minute:"2-digit" });
  } catch(e) {
    showError(`Error: ${e}`);
  }
}

load();
setInterval(load, 60_000);
</script>
</body>
</html>
