<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Claude Token Tracker</title>
<link rel="icon" type="image/png" href="icons/icon48.png"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0F0E0D;
    color: #FFFDF7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
  }
  .logo {
    width: 28px; height: 28px;
    flex-shrink: 0;
  }
  .logo img { display: block; width: 100%; height: 100%; }
  .header-text h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -.01em;
  }
  .header-text p {
    font-size: 11.5px;
    color: rgba(255,253,247,.35);
    margin-top: 1px;
  }

  /* ── Cards ── */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 320px;
  }

  .card {
    background: rgba(255,253,247,.04);
    border: 1px solid rgba(255,253,247,.07);
    border-radius: 12px;
    padding: 18px 20px 16px;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
  }
  .card-label {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,253,247,.55);
    letter-spacing: .02em;
    text-transform: uppercase;
  }
  .card-reset {
    font-size: 11px;
    color: rgba(255,253,247,.28);
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .bar-track {
    flex: 1;
    height: 4px;
    background: rgba(255,253,247,.08);
    border-radius: 100px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 100px;
    transition: width .7s cubic-bezier(.4,0,.2,1);
  }
  .pct {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -.02em;
    min-width: 58px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ── States ── */
  .state {
    width: 320px;
    text-align: center;
    color: rgba(255,253,247,.3);
    font-size: 13px;
    line-height: 1.6;
  }
  .state small {
    display: block;
    font-size: 11px;
    margin-top: 6px;
    color: rgba(255,253,247,.18);
  }

  .updated {
    margin-top: 20px;
    font-size: 10.5px;
    color: rgba(255,253,247,.18);
  }

  /* ── Live badge ── */
  .live-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 18px;
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    color: rgba(255,253,247,.3);
    border: 1px solid rgba(255,253,247,.1);
    border-radius: 100px;
    padding: 3px 8px 3px 6px;
    transition: color .3s, border-color .3s;
  }
  .live-badge.active {
    color: #4ADE80;
    border-color: rgba(74,222,128,.35);
  }
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: .5;
  }
  .live-badge.active .live-dot {
    opacity: 1;
    animation: pulse-dot 1.2s ease-in-out;
  }
  @keyframes pulse-dot {
    0%   { transform: scale(1);   opacity: 1; }
    50%  { transform: scale(1.6); opacity: .7; }
    100% { transform: scale(1);   opacity: 1; }
  }

  /* ── Footer links ── */
  .footer {
    margin-top: 28px;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .footer a {
    font-size: 11px;
    color: rgba(255,253,247,.2);
    text-decoration: none;
    letter-spacing: .01em;
    transition: color .2s;
  }
  .footer a:hover { color: rgba(255,253,247,.5); }
  .footer-sep {
    width: 1px;
    height: 10px;
    background: rgba(255,253,247,.1);
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="icons/icon48.png" alt="Claude Token Tracker"/>
  </div>
  <div class="header-text">
    <h1>Usage</h1>
    <p>claude.ai · plan Pro</p>
  </div>
</div>

<div id="content">
  <div class="state">Loading…</div>
</div>

<div class="live-row">
  <span class="live-badge" id="liveBadge">
    <span class="live-dot"></span>
    LIVE
  </span>
</div>

<div class="updated" id="updated"></div>

<div class="footer">
  <a href="https://github.com/mmesonero" target="_blank">GitHub</a>
  <div class="footer-sep"></div>
  <a href="https://www.linkedin.com/in/mesonero/" target="_blank">LinkedIn</a>
</div>

<script src="dashboard.js"></script>
</body>
</html>
