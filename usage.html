<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Claude Code Usage</title>
  <link rel="icon" type="image/png" href="icons/icon48.png">
  <script src="lib/chart.umd.min.js"></script>
  <script src="lib/chartjs-plugin-datalabels.js"></script>
  <style>
    :root {
      --bg: #262624;
      --panel: #30302e;
      --panel-2: #3a3a37;
      --border: rgba(250, 249, 245, 0.08);
      --border-strong: rgba(250, 249, 245, 0.14);
      --text: #faf9f5;
      --muted: #b9b9b3;
      --muted-2: #8a8a83;
      --accent: #d97757;
      --accent-soft: rgba(217, 119, 87, 0.14);
      --good: #6ee7b7;
      --warn: #fbbf24;
      --bad: #fb7185;
      --serif: "Source Serif 4", "Source Serif Pro", "Tiempos Headline", Georgia, ui-serif, serif;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font: 14px/1.55 var(--sans); -webkit-font-smoothing: antialiased; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header { padding: 40px 48px 28px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; max-width: 1400px; margin: 0 auto; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-mark { width: 30px; height: 30px; flex-shrink: 0; display: block; }
    .brand-mark img { width: 100%; height: 100%; display: block; }
    header h1 { font-family: var(--serif); font-size: 24px; margin: 0; font-weight: 500; letter-spacing: -0.01em; }
    header h1 .accent { color: var(--accent); font-style: italic; }
    header .gen { color: var(--muted-2); font-size: 12px; margin-left: 4px; }
    header .filter { margin-left: auto; display: flex; gap: 10px; align-items: center; }
    header .filter label { color: var(--muted); font-size: 13px; }
    select, button {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      padding: 8px 12px;
      font: 500 13px var(--sans);
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .date-input {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      padding: 7px 10px;
      font: 500 13px var(--sans);
      color-scheme: dark;
    }
    select:hover, button:hover { background: var(--panel-2); border-color: rgba(250,249,245,0.22); }
    button:active { transform: translateY(1px); }
    select:focus, button:focus { outline: 2px solid var(--accent); outline-offset: 2px; }

    main { padding: 4px 48px 32px; max-width: 1400px; margin: 0 auto; }
    .grid { display: grid; gap: 20px; }
    .cards { grid-template-columns: repeat(4, 1fr); margin-bottom: 44px; }
    .charts { grid-template-columns: repeat(3, 1fr); }
    @media (max-width: 1200px) {
      .cards { grid-template-columns: repeat(2, 1fr); }
      .charts { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 700px) {
      .cards { grid-template-columns: 1fr; }
      .charts { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .cards { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 26px;
      transition: border-color .15s;
    }
    .card:hover { border-color: var(--border-strong); }
    .card .label { color: var(--muted); font-size: 12px; font-weight: 500; letter-spacing: 0.02em; }
    .card .value { font-family: var(--serif); font-size: 32px; font-weight: 500; margin-top: 10px; letter-spacing: -0.02em; line-height: 1.1; }
    .card .sub { color: var(--muted-2); font-size: 12px; margin-top: 8px; }
    .card .sub .up { color: var(--bad); }
    .card .sub .down { color: var(--good); }
    .metric-good { color: var(--good); }
    .metric-warn { color: var(--warn); }
    .metric-bad  { color: var(--bad); }

    .chart-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 26px 28px 24px 22px;
      min-width: 0;
      overflow: visible;
    }
    @media (max-width: 520px) {
      .chart-card { padding: 14px 14px 14px 8px; }
      main { padding: 8px 12px 60px; }
      header { padding: 20px 16px 16px; }
    }
    .chart-card h2 {
      font-family: var(--serif);
      font-size: 16px;
      margin: 0 0 16px;
      color: var(--text);
      font-weight: 500;
      letter-spacing: -0.005em;
    }
    .chart-wrap { position: relative; height: 380px; }
    .chart-wrap.tall { height: 400px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 11px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
    tr:last-child td { border-bottom: 0; }
    tbody tr { transition: background .12s; }
    tbody tr:hover { background: rgba(250,249,245,0.025); }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; background: var(--accent-soft); color: var(--accent); border: 1px solid rgba(217,119,87,0.25); font-size: 11px; font-weight: 500; }
    .pill.codex { background: rgba(110,231,183,0.12); color: var(--good); border-color: rgba(110,231,183,0.25); }

    footer { text-align: center; color: var(--muted-2); font-size: 12px; padding: 24px 20px 20px; }
    footer code { background: var(--panel); padding: 2px 8px; border-radius: 6px; border: 1px solid var(--border); font-size: 12px; }
    .footer-link { color: var(--muted); text-decoration: none; transition: color .2s; }
    .footer-link:hover { color: var(--text); }
    .footer-sep { margin: 0 8px; opacity: .3; }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-mark"><img src="icons/icon48.png" alt="Claude Token Tracker"></div>
      <h1>Claude Code <span class="accent">usage</span></h1>
    </div>
    <span class="gen" id="gen"></span>
    <div class="filter">
      <label for="range">Range</label>
      <select id="range">
        <option value="7">Last 7 days</option>
        <option value="30">Last 30 days</option>
        <option value="90">Last 90 days</option>
        <option value="all" selected>All time</option>
        <option value="custom">Custom…</option>
      </select>
      <input type="date" id="from" class="date-input" hidden>
      <input type="date" id="to" class="date-input" hidden>
      <label for="agent">Agent</label>
      <select id="agent"><option value="all">All</option></select>
      <label for="project">Project</label>
      <select id="project"><option value="all">All</option></select>
    </div>
  </header>

  <main>
    <section class="grid cards" id="cards"></section>

    <section class="grid charts">
      <div class="chart-card"><h2>Tokens per day</h2><div class="chart-wrap tall"><canvas id="cTokens"></canvas></div></div>
      <div class="chart-card"><h2>Model breakdown (tokens)</h2><div class="chart-wrap"><canvas id="cModels"></canvas></div></div>
      <div class="chart-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <h2 style="margin:0">Top projects by cost</h2>
          <button id="toggleProjects" style="font-size:11px;padding:5px 12px;border-radius:8px">▼ All projects</button>
        </div>
        <div class="chart-wrap tall"><canvas id="cProjects"></canvas></div>
      </div>
    </section>

    <div id="projectsDetail" style="display:none;margin-top:20px">
      <div class="chart-card">
        <h2>All projects</h2>
        <table>
          <thead><tr><th>Project</th><th>Last activity</th><th>Agents</th><th class="num">Sessions</th><th class="num">Tokens</th><th class="num">Cost</th></tr></thead>
          <tbody id="tblProjects"></tbody>
        </table>
      </div>
    </div>

  </main>

  <footer>
    <a class="footer-link" href="https://github.com/mmesonero" target="_blank" rel="noopener">GitHub</a>
    <span class="footer-sep">·</span>
    <a class="footer-link" href="https://www.linkedin.com/in/mesonero/" target="_blank" rel="noopener">LinkedIn</a>
  </footer>

  <script src="usage-data.js"></script>
  <script src="usage-app.js"></script>
</body>
</html>
