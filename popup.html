<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude Token Tracker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">

    <!-- ── Header ───────────────────────────────────────────── -->
    <header class="header">
      <div class="brand">
        <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- Anthropic-style stylised "C" with token bar motif -->
          <circle cx="12" cy="12" r="10" fill="#D4670F"/>
          <rect x="7"  y="14" width="3" height="4" rx="1" fill="white" opacity="0.9"/>
          <rect x="10.5" y="10" width="3" height="8" rx="1" fill="white" opacity="0.9"/>
          <rect x="14" y="7"  width="3" height="11" rx="1" fill="white" opacity="0.9"/>
        </svg>
        <span class="brand-name">Token Tracker</span>
      </div>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- ── Tab bar ───────────────────────────────────────────── -->
    <div class="tab-bar" role="tablist">
      <button class="tab active" data-tab="today" role="tab" aria-selected="true">Today</button>
      <button class="tab"        data-tab="week"  role="tab" aria-selected="false">This Week</button>
    </div>

    <!-- ── Panels ────────────────────────────────────────────── -->
    <div class="panels">

      <!-- TODAY -->
      <div class="panel active" id="today" role="tabpanel">

        <div class="main-card">
          <div class="row-between">
            <span class="label-caps">Total tokens</span>
            <span class="value-lg" id="todayTotal">—</span>
          </div>
          <div class="progress-wrap">
            <div class="progress-track">
              <div class="progress-fill" id="todayBar" style="width:0%"></div>
            </div>
            <span class="pct-label" id="todayPct">0%</span>
          </div>
          <div class="row-between mt2">
            <span class="muted">of <span id="todayLimit">1M</span> limit</span>
          </div>
        </div>

        <!-- Input / Output split -->
        <div class="io-card">
          <div class="io-row">
            <span class="io-dot blue"></span>
            <span class="io-label">Input</span>
            <div class="io-track">
              <div class="io-fill blue" id="todayInputBar" style="width:0%"></div>
            </div>
            <span class="io-value" id="todayInput">—</span>
          </div>
          <div class="io-row">
            <span class="io-dot purple"></span>
            <span class="io-label">Output</span>
            <div class="io-track">
              <div class="io-fill purple" id="todayOutputBar" style="width:0%"></div>
            </div>
            <span class="io-value" id="todayOutput">—</span>
          </div>
        </div>

        <!-- Models -->
        <div class="section-header">By model</div>
        <div class="models-list" id="todayModels"></div>

      </div><!-- /today -->

      <!-- THIS WEEK -->
      <div class="panel" id="week" role="tabpanel">

        <div class="main-card">
          <div class="row-between">
            <span class="label-caps">Total tokens</span>
            <span class="value-lg" id="weekTotal">—</span>
          </div>
          <div class="progress-wrap">
            <div class="progress-track">
              <div class="progress-fill" id="weekBar" style="width:0%"></div>
            </div>
            <span class="pct-label" id="weekPct">0%</span>
          </div>
          <div class="row-between mt2">
            <span class="muted">of <span id="weekLimit">7M</span> limit</span>
          </div>
        </div>

        <!-- Input / Output split -->
        <div class="io-card">
          <div class="io-row">
            <span class="io-dot blue"></span>
            <span class="io-label">Input</span>
            <div class="io-track">
              <div class="io-fill blue" id="weekInputBar" style="width:0%"></div>
            </div>
            <span class="io-value" id="weekInput">—</span>
          </div>
          <div class="io-row">
            <span class="io-dot purple"></span>
            <span class="io-label">Output</span>
            <div class="io-track">
              <div class="io-fill purple" id="weekOutputBar" style="width:0%"></div>
            </div>
            <span class="io-value" id="weekOutput">—</span>
          </div>
        </div>

        <!-- Sparkline (7-day history) -->
        <div class="section-header">7-day history</div>
        <div class="sparkline-wrap">
          <canvas id="sparkCanvas" width="286" height="44"></canvas>
        </div>

        <!-- Models -->
        <div class="section-header mt8">By model</div>
        <div class="models-list" id="weekModels"></div>

      </div><!-- /week -->

    </div><!-- /panels -->

    <!-- ── Footer ────────────────────────────────────────────── -->
    <footer class="footer">
      <span class="muted-sm" id="lastUpdated">No data yet — visit claude.ai</span>
      <button class="btn-ghost sm" id="resetBtn">Reset</button>
    </footer>

  </div><!-- /app -->

  <script src="popup.js"></script>
</body>
</html>
